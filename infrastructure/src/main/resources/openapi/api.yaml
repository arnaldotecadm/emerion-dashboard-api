  /products/by-external-id/{externalId}:
    get:
      tags:
        - products
      operationId: getProductByExternalId
      summary: Get a single product by externalId (the legacy Firebird ID)
      parameters:
        - name: externalId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Product found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ingestion/customer-addresses:
    post:
      tags:
        - customer-address-ingestion
      operationId: ingestCustomerAddresses
      summary: Ingest a batch of customer address sets from emerion-load-service
      description: >
        Accepts a batch of customer address records already transformed by
        emerion-load-service. Upserts by externalId (the customer's legacy
        Firebird codCli); each item's full `enderecos` list replaces any
        previously stored address details for that customer, so the
        operation is idempotent and safe to re-run.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerAddressIngestionBatch'
      responses:
        '200':
          description: Batch processed (see per-item results for partial failures)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionResult'
        '400':
          description: Malformed request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Unexpected server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ingestion/customer-addresses/single:
    post:
      tags:
        - customer-address-ingestion
      operationId: ingestSingleCustomerAddress
      summary: Ingest a single customer's address set from emerion-load-service
      description: >
        Accepts one customer's full address set already transformed by
        emerion-load-service. Equivalent to sending a batch of one item to
        POST /ingestion/customer-addresses. Same upsert-by-externalId
        idempotency guarantee applies (this is the endpoint currently used
        by emerion-load-service's CustomerAddressController#sendAddressToIngestion).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerAddressIngestionItem'
      responses:
        '200':
          description: Item processed (outcome reflects CREATED/UPDATED/FAILED)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionItemResult'
        '400':
          description: Malformed request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Unexpected server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /customer-addresses:
    get:
      tags:
        - customer-addresses
      operationId: listCustomerAddresses
      summary: List customer address sets (paginated) for the React dashboard
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: cpfCnpj
          in: query
          description: Partial, case-insensitive match on customer cpfCnpj
          required: false
          schema:
            type: string
        - name: cnpjEmpresa
          in: query
          description: Exact match on the owning retailer's cnpjEmpresa
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Paginated list of customer address sets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerAddressPage'

  /customer-addresses/{id}:
    get:
      tags:
        - customer-addresses
      operationId: getCustomerAddressById
      summary: Get a single customer's address set by internal (PostgreSQL) id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Customer address set found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerAddressResponse'
        '404':
