    CustomerCreditIngestionItem:
      type: object
      description: One credit ledger entry for a customer.
      required:
        - customerExternalId
        - data
        - valorUtilizado
        - valorTotal
        - saldo
        - tipo
      properties:
        customerExternalId:
          type: string
          description: >
            Customer's legacy Firebird primary key (codCli). Combined with
            sequencia, used as the upsert/idempotency key.
        sequencia:
          type: string
          nullable: true
          description: >
            Legacy sequence number of this credit movement for the customer.
            When null, this entry cannot be safely deduplicated and is
            always inserted as a new row.
        data:
          type: string
          format: date-time
        dataPedido:
          type: string
          format: date-time
          nullable: true
        valorUtilizado:
          type: number
        valorTotal:
          type: number
        saldo:
          type: number
        situacao:
          type: string
          nullable: true
        tipo:
          type: string
          description: ENTRADA or SAIDA.

