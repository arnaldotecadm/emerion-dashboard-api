openapi: 3.0.3
info:
  title: Emerion Dashboard API
  description: >
    ERP API responsible for (1) receiving already-mapped data from
    emerion-load-service (which extracts from the legacy Firebird database)
    and persisting it into PostgreSQL, and (2) serving that data to the
    React frontend. This file is the single source of truth for the API
    contract (contract-first). Kotlin interfaces and models are generated
    from this spec via the openapi-generator-gradle-plugin
    (see build.gradle.kts `openApiGenerate` task) — do not hand-write
    controller interfaces or request/response models, edit this file instead
    and regenerate.
  version: "1.0.0"
servers:
  - url: /api/v1
tags:
  - name: customer-ingestion
    description: >
      Endpoints called by emerion-load-service to push migrated Firebird
      data into PostgreSQL. Not consumed by the React app.
  - name: customers
    description: Read endpoints consumed by the React frontend.
  - name: product-ingestion
    description: >
      Endpoints called by emerion-load-service to push migrated Firebird
      product data into PostgreSQL. Not consumed by the React app.
  - name: products
    description: Read endpoints consumed by the React frontend.
  - name: customer-address-ingestion
    description: >
      Endpoints called by emerion-load-service to push a customer's full
      address set (billing/shipping/etc.) into PostgreSQL. Not consumed by
      the React app.
  - name: customer-addresses
    description: Read endpoints consumed by the React frontend.
  - name: customer-credit-ingestion
    description: >
      Endpoints called by emerion-load-service to push customer credit
      ledger entries into PostgreSQL. Not consumed by the React app.
  - name: customer-credits
    description: Read endpoints consumed by the React frontend.
  - name: customer-order-ingestion
    description: >
      Endpoints called by emerion-load-service to push a customer order and
      its line items into PostgreSQL. Not consumed by the React app.
  - name: customer-orders
    description: Read endpoints consumed by the React frontend.
  - name: vendedor-ingestion
    description: >
      Endpoints called by emerion-load-service to push migrated Firebird
      vendedor (sales representative) data into PostgreSQL. Not consumed by
      the React app.
  - name: vendedores
    description: Read endpoints consumed by the React frontend.

paths:
  /ingestion/customers:
    post:
      tags:
        - customer-ingestion
      operationId: ingestCustomers
      summary: Ingest a batch of customers from emerion-load-service
      description: >
        Accepts a batch of customer records already transformed by
        emerion-load-service. Upserts by externalId (the legacy Firebird ID)
        so the operation is idempotent and safe to re-run.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerIngestionBatch'
      responses:
        '200':
          description: Batch processed (see per-item results for partial failures)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionResult'
        '400':
          description: Malformed request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Unexpected server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ingestion/customers/single:
    post:
      tags:
        - customer-ingestion
      operationId: ingestSingleCustomer
      summary: Ingest a single customer record from emerion-load-service
      description: >
        Accepts one customer record already transformed by
        emerion-load-service. Equivalent to sending a batch of one item to
        POST /ingestion/customers, but avoids the batch envelope for
        callers that send records one at a time. Same upsert-by-externalId
        idempotency guarantee applies.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerIngestionItem'
      responses:
        '200':
          description: Item processed (outcome reflects CREATED/UPDATED/FAILED)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionItemResult'
        '400':
          description: Malformed request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Unexpected server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /customers:
    get:
      tags:
        - customers
      operationId: listCustomers
      summary: List customers (paginated) for the React dashboard
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: bloqueado
          in: query
          description: Filter by blocked/unblocked status
          required: false
          schema:
            type: boolean
        - name: nomeFantasia
          in: query
          description: Partial, case-insensitive match on customer nomeFantasia
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Paginated list of customers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerPage'

  /customers/{id}:
    get:
      tags:
        - customers
      operationId: getCustomerById
      summary: Get a single customer by internal (PostgreSQL) id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Customer found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerResponse'
        '404':
          description: Customer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ingestion/products:
    post:
      tags:
        - product-ingestion
      operationId: ingestProducts
      summary: Ingest a batch of products from emerion-load-service
      description: >
        Accepts a batch of product records already transformed by
        emerion-load-service. Upserts by externalId (the legacy Firebird ID)
        so the operation is idempotent and safe to re-run.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductIngestionBatch'
      responses:
        '200':
          description: Batch processed (see per-item results for partial failures)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionResult'
        '400':
          description: Malformed request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Unexpected server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ingestion/products/single:
    post:
      tags:
        - product-ingestion
      operationId: ingestSingleProduct
      summary: Ingest a single product record from emerion-load-service
      description: >
        Accepts one product record already transformed by
        emerion-load-service. Equivalent to sending a batch of one item to
        POST /ingestion/products, but avoids the batch envelope for
        callers that send records one at a time. Same upsert-by-externalId
        idempotency guarantee applies.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductIngestionItem'
      responses:
        '200':
          description: Item processed (outcome reflects CREATED/UPDATED/FAILED)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionItemResult'
        '400':
          description: Malformed request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Unexpected server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /products:
    get:
      tags:
        - products
      operationId: listProducts
      summary: List products (paginated) for the React dashboard
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: nome
          in: query
          description: Partial, case-insensitive match on product nome
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Paginated list of products
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductPage'

  /products/{id}:
    get:
      tags:
        - products
      operationId: getProductById
      summary: Get a single product by internal (PostgreSQL) id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Product found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ingestion/customer-addresses:
    post:
      tags:
        - customer-address-ingestion
      operationId: ingestCustomerAddresses
      summary: Ingest a batch of customer address sets from emerion-load-service
      description: >
        Accepts a batch of customer address records already transformed by
        emerion-load-service. Upserts by externalId (the customer's legacy
        Firebird codCli); each item's full `enderecos` list replaces any
        previously stored address details for that customer, so the
        operation is idempotent and safe to re-run.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerAddressIngestionBatch'
      responses:
        '200':
          description: Batch processed (see per-item results for partial failures)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionResult'
        '400':
          description: Malformed request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Unexpected server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ingestion/customer-addresses/single:
    post:
      tags:
        - customer-address-ingestion
      operationId: ingestSingleCustomerAddress
      summary: Ingest a single customer's address set from emerion-load-service
      description: >
        Accepts one customer's full address set already transformed by
        emerion-load-service. Equivalent to sending a batch of one item to
        POST /ingestion/customer-addresses. Same upsert-by-externalId
        idempotency guarantee applies (this is the endpoint currently used
        by emerion-load-service's CustomerAddressController#sendAddressToIngestion).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerAddressIngestionItem'
      responses:
        '200':
          description: Item processed (outcome reflects CREATED/UPDATED/FAILED)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionItemResult'
        '400':
          description: Malformed request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Unexpected server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /customer-addresses:
    get:
      tags:
        - customer-addresses
      operationId: listCustomerAddresses
      summary: List customer address sets (paginated) for the React dashboard
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: cpfCnpj
          in: query
          description: Partial, case-insensitive match on customer cpfCnpj
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Paginated list of customer address sets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerAddressPage'

  /customer-addresses/{id}:
    get:
      tags:
        - customer-addresses
      operationId: getCustomerAddressById
      summary: Get a single customer's address set by internal (PostgreSQL) id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Customer address set found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerAddressResponse'
        '404':
          description: Customer address set not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ingestion/customer-credits/batch:
    post:
      tags:
        - customer-credit-ingestion
      operationId: ingestCustomerCreditsBatch
      summary: Ingest a batch of customer credit ledger entries from emerion-load-service
      description: >
        Accepts a plain array of credit entries already transformed by
        emerion-load-service. Deliberately a bare array (no batchId/items
        envelope): this matches emerion-load-service's
        CustomerCreditController#sendCreditsToIngestion, which posts
        List<CustomerCreditIngestionDto> directly since credit entries carry
        no independent externalId of their own (only customerExternalId +
        sequencia). A batchId is generated server-side for the response.
        Upserts by (customerExternalId, sequencia) when sequencia is
        present; entries with a null sequencia cannot be safely deduplicated
        and are always inserted as new rows.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/CustomerCreditIngestionItem'
      responses:
        '200':
          description: Batch processed (see per-item results for partial failures)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionResult'
        '400':
          description: Malformed request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Unexpected server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ingestion/customer-credits/single:
    post:
      tags:
        - customer-credit-ingestion
      operationId: ingestSingleCustomerCredit
      summary: Ingest a single customer credit ledger entry from emerion-load-service
      description: >
        Accepts one credit entry already transformed by emerion-load-service.
        Equivalent to sending a batch of one item to
        POST /ingestion/customer-credits/batch. Same upsert-by-
        (customerExternalId, sequencia) idempotency guarantee applies.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerCreditIngestionItem'
      responses:
        '200':
          description: Item processed (outcome reflects CREATED/UPDATED/FAILED)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionItemResult'
        '400':
          description: Malformed request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Unexpected server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /customer-credits:
    get:
      tags:
        - customer-credits
      operationId: listCustomerCredits
      summary: List customer credit ledger entries (paginated) for the React dashboard
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: customerExternalId
          in: query
          description: Exact match on the owning customer's externalId (codCli)
          required: false
          schema:
            type: string
        - name: tipo
          in: query
          description: Exact match on entry tipo (ENTRADA or SAIDA)
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Paginated list of customer credit ledger entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerCreditPage'

  /customer-credits/{id}:
    get:
      tags:
        - customer-credits
      operationId: getCustomerCreditById
      summary: Get a single customer credit ledger entry by internal (PostgreSQL) id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Customer credit entry found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerCreditResponse'
        '404':
          description: Customer credit entry not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ingestion/customer-orders:
    post:
      tags:
        - customer-order-ingestion
      operationId: ingestCustomerOrders
      summary: Ingest a batch of customer orders from emerion-load-service
      description: >
        Accepts a batch of order records (with line items) already
        transformed by emerion-load-service. Upserts by externalId (the
        legacy Firebird numres); each item's full `itens` list replaces any
        previously stored line items for that order, so the operation is
        idempotent and safe to re-run.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerOrderIngestionBatch'
      responses:
        '200':
          description: Batch processed (see per-item results for partial failures)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionResult'
        '400':
          description: Malformed request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Unexpected server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ingestion/customer-orders/single:
    post:
      tags:
        - customer-order-ingestion
      operationId: ingestSingleCustomerOrder
      summary: Ingest a single customer order from emerion-load-service
      description: >
        Accepts one order record (with line items) already transformed by
        emerion-load-service. Equivalent to sending a batch of one item to
        POST /ingestion/customer-orders. Same upsert-by-externalId
        idempotency guarantee applies (this is the endpoint currently used
        by emerion-load-service's CustomerOrderController#sendOrderToIngestion).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerOrderIngestionItem'
      responses:
        '200':
          description: Item processed (outcome reflects CREATED/UPDATED/FAILED)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionItemResult'
        '400':
          description: Malformed request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Unexpected server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /customer-orders:
    get:
      tags:
        - customer-orders
      operationId: listCustomerOrders
      summary: List customer orders (paginated) for the React dashboard
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: codCli
          in: query
          description: Exact match on the owning customer's externalId (codCli)
          required: false
          schema:
            type: string
        - name: sitres
          in: query
          description: Exact match on order status (sitres)
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Paginated list of customer orders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerOrderPage'

  /customer-orders/{id}:
    get:
      tags:
        - customer-orders
      operationId: getCustomerOrderById
      summary: Get a single customer order by internal (PostgreSQL) id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Customer order found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerOrderResponse'
        '404':
          description: Customer order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ingestion/vendedores:
    post:
      tags:
        - vendedor-ingestion
      operationId: ingestVendedores
      summary: Ingest a batch of vendedores from emerion-load-service
      description: >
        Accepts a batch of vendedor (sales representative) records already
        transformed by emerion-load-service. Upserts by externalId (the
        legacy Firebird ID) so the operation is idempotent and safe to
        re-run.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VendedorIngestionBatch'
      responses:
        '200':
          description: Batch processed (see per-item results for partial failures)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionResult'
        '400':
          description: Malformed request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Unexpected server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ingestion/vendedores/single:
    post:
      tags:
        - vendedor-ingestion
      operationId: ingestSingleVendedor
      summary: Ingest a single vendedor record from emerion-load-service
      description: >
        Accepts one vendedor record already transformed by
        emerion-load-service. Equivalent to sending a batch of one item to
        POST /ingestion/vendedores, but avoids the batch envelope for
        callers that send records one at a time. Same upsert-by-externalId
        idempotency guarantee applies.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VendedorIngestionItem'
      responses:
        '200':
          description: Item processed (outcome reflects CREATED/UPDATED/FAILED)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionItemResult'
        '400':
          description: Malformed request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Unexpected server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /vendedores:
    get:
      tags:
        - vendedores
      operationId: listVendedores
      summary: List vendedores (paginated) for the React dashboard
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: nome
          in: query
          description: Partial, case-insensitive match on vendedor nome
          required: false
          schema:
            type: string
        - name: situacao
          in: query
          description: Exact match on vendedor situacao
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Paginated list of vendedores
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VendedorPage'

  /vendedores/{id}:
    get:
      tags:
        - vendedores
      operationId: getVendedorById
      summary: Get a single vendedor by internal (PostgreSQL) id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Vendedor found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VendedorResponse'
        '404':
          description: Vendedor not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    CustomerIngestionItem:
      type: object
      description: One customer record as produced by emerion-load-service.
      required:
        - externalId
        - nomeFantasia
        - razaoSocial
        - cpfCnpj
        - bloqueado
      properties:
        externalId:
          type: string
          description: Original Firebird primary key, used as the upsert/idempotency key.
        nomeFantasia:
          type: string
        razaoSocial:
          type: string
        cpfCnpj:
          type: string
        inscricaoEstadual:
          type: string
          nullable: true
        regimeTributario:
          type: string
          nullable: true
        bloqueado:
          type: boolean
        createdAt:
          type: string
          format: date-time
          nullable: true

    CustomerIngestionBatch:
      type: object
      required:
        - batchId
        - items
      properties:
        batchId:
          type: string
          description: Correlation id supplied by emerion-load-service for tracing/logging.
        items:
          type: array
          items:
