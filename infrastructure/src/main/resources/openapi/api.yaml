      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerOrderIngestionItem'
      responses:
        '200':
          description: Item processed (outcome reflects CREATED/UPDATED/FAILED)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionItemResult'
        '400':
          description: Malformed request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Unexpected server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /customer-orders:
    get:
      tags:
        - customer-orders
      operationId: listCustomerOrders
      summary: List customer orders (paginated) for the React dashboard
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: codCli
          in: query
          description: Exact match on the owning customer's externalId (codCli)
          required: false
          schema:
            type: string
        - name: sitres
          in: query
          description: Exact match on order status (sitres)
          required: false
          schema:
            type: string
        - name: cnpjEmpresa
          in: query
          description: Exact match on the owning retailer's cnpjEmpresa
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Paginated list of customer orders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerOrderPage'

  /customer-orders/{id}:
    get:
      tags:
        - customer-orders
      operationId: getCustomerOrderById
      summary: Get a single customer order by internal (PostgreSQL) id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Customer order found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerOrderResponse'
        '404':
