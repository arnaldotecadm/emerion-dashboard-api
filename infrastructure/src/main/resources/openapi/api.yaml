      tags:
        - vendedor-ingestion
      operationId: ingestVendedores
      summary: Ingest a batch of vendedores from emerion-load-service
      description: >
        Accepts a batch of vendedor (sales representative) records already
        transformed by emerion-load-service. Upserts by externalId (the
        legacy Firebird ID) so the operation is idempotent and safe to
        re-run.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VendedorIngestionBatch'
      responses:
        '200':
          description: Batch processed (see per-item results for partial failures)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionResult'
        '400':
          description: Malformed request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Unexpected server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ingestion/vendedores/single:
    post:
      tags:
        - vendedor-ingestion
      operationId: ingestSingleVendedor
      summary: Ingest a single vendedor record from emerion-load-service
      description: >
        Accepts one vendedor record already transformed by
        emerion-load-service. Equivalent to sending a batch of one item to
        POST /ingestion/vendedores, but avoids the batch envelope for
        callers that send records one at a time. Same upsert-by-externalId
        idempotency guarantee applies.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VendedorIngestionItem'
      responses:
        '200':
          description: Item processed (outcome reflects CREATED/UPDATED/FAILED)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionItemResult'
        '400':
          description: Malformed request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Unexpected server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /vendedores:
    get:
      tags:
        - vendedores
      operationId: listVendedores
      summary: List vendedores (paginated) for the React dashboard
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: nome
          in: query
          description: Partial, case-insensitive match on vendedor nome
          required: false
          schema:
            type: string
        - name: situacao
          in: query
          description: Exact match on vendedor situacao
          required: false
          schema:
            type: string
        - name: cnpjEmpresa
          in: query
          description: Exact match on the owning retailer's cnpjEmpresa
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Paginated list of vendedores
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VendedorPage'

  /vendedores/{id}:
    get:
      tags:
        - vendedores
      operationId: getVendedorById
      summary: Get a single vendedor by internal (PostgreSQL) id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Vendedor found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VendedorResponse'
        '404':
          description: Vendedor not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /notifications:
    get:
      tags:
        - notifications
      operationId: listNotifications
      summary: List the authenticated user's notifications (paginated)
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: status
          in: query
          description: Filter by notification status
          required: false
          schema:
            $ref: '#/components/schemas/NotificationStatus'
        - name: category
          in: query
          description: Filter by notification category
          required: false
          schema:
            $ref: '#/components/schemas/NotificationCategory'
      responses:
        '200':
          description: Paginated list of the caller's notifications
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationPage'

  /notifications/{id}:
    get:
      tags:
        - notifications
      operationId: getNotificationById
      summary: Get a single notification by id, scoped to the authenticated user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Notification found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationResponse'
        '404':
          description: Notification not found (or does not belong to the caller)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /notifications/{id}/read:
    patch:
      tags:
        - notifications
      operationId: markNotificationAsRead
      summary: Mark a notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Notification updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationResponse'
        '404':
          description: Notification not found (or does not belong to the caller)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /notifications/{id}/dismiss:
    patch:
      tags:
        - notifications
      operationId: dismissNotification
      summary: Dismiss a notification
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Notification updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationResponse'
        '404':
          description: Notification not found (or does not belong to the caller)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/cognito-users/sync:
    post:
      tags:
        - admin
      operationId: syncCognitoUsers
      summary: >
        Manually re-trigger the Cognito user directory sync (also run once
        automatically at application startup). Requires the ADMIN Cognito
        group.
      responses:
        '200':
          description: Sync completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CognitoUserSyncResponse'

components:
  schemas:
    CustomerIngestionItem:
      type: object
      description: One customer record as produced by emerion-load-service.
      required:
        - externalId
        - cnpjEmpresa
        - nomeFantasia
        - razaoSocial
        - cpfCnpj
        - bloqueado
      properties:
        externalId:
          type: string
          description: Original Firebird primary key, used as the upsert/idempotency key.
        cnpjEmpresa:
          type: string
          description: Retailer/tenant CNPJ that owns this record, used to segregate data per retailer.
        nomeFantasia:
          type: string
        razaoSocial:
          type: string
        cpfCnpj:
          type: string
        inscricaoEstadual:
          type: string
          nullable: true
        regimeTributario:
          type: string
          nullable: true
        bloqueado:
          type: boolean
        createdAt:
          type: string
          format: date-time
          nullable: true

    CustomerIngestionBatch:
      type: object
      required:
        - batchId
        - items
      properties:
        batchId:
          type: string
          description: Correlation id supplied by emerion-load-service for tracing/logging.
        items:
          type: array
          items:
            $ref: '#/components/schemas/CustomerIngestionItem'

    IngestionItemResult:
      type: object
      properties:
        externalId:
          type: string
        outcome:
          type: string
          enum: [CREATED, UPDATED, FAILED]
        errorMessage:
          type: string
          nullable: true

    IngestionResult:
      type: object
      properties:
        batchId:
          type: string
        totalReceived:
          type: integer
        totalSucceeded:
          type: integer
        totalFailed:
          type: integer
        results:
          type: array
          items:
            $ref: '#/components/schemas/IngestionItemResult'

    CustomerResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        externalId:
          type: string
        cnpjEmpresa:
          type: string
        nomeFantasia:
          type: string
        razaoSocial:
          type: string
        cpfCnpj:
          type: string
        inscricaoEstadual:
          type: string
          nullable: true
        regimeTributario:
          type: string
          nullable: true
        bloqueado:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CustomerPage:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/CustomerResponse'
        pagination:
          $ref: '#/components/schemas/PaginationInfo'

    PaginationInfo:
      type: object
      properties:
        total:
          type: integer
          format: int64
        page:
          type: integer
        size:
          type: integer
        totalPages:
          type: integer

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: string
              nullable: true
        timestamp:
          type: string
          format: date-time

    ProductIngestionItem:
      type: object
      description: One product record as produced by emerion-load-service.
      required:
        - externalId
        - cnpjEmpresa
        - nome
      properties:
        externalId:
          type: string
          description: Original Firebird primary key, used as the upsert/idempotency key.
        cnpjEmpresa:
          type: string
          description: Retailer/tenant CNPJ that owns this record, used to segregate data per retailer.
        nome:
          type: string
        preco:
          type: number
          nullable: true

    ProductIngestionBatch:
      type: object
      required:
        - batchId
        - items
      properties:
        batchId:
          type: string
          description: Correlation id supplied by emerion-load-service for tracing/logging.
        items:
          type: array
          items:
            $ref: '#/components/schemas/ProductIngestionItem'

    CustomerAddressDetailIngestionItem:
      type: object
      description: One address entry (billing/shipping/etc.) for a customer.
      required:
        - tipo
      properties:
        tipo:
          type: string
          description: Address kind, e.g. FATURAMENTO, COBRANCA, COMPRAS, ENTREGA.
        cep:
          type: string
          nullable: true
        endereco:
          type: string
          nullable: true
        numero:
          type: string
          nullable: true
        referencia:
          type: string
          nullable: true
        bairro:
          type: string
          nullable: true
        cidade:
          type: string
          nullable: true
        uf:
          type: string
          nullable: true
        telefone:
          type: string
          nullable: true
        telefoneContato:
          type: string
          nullable: true
        complemento:
          type: string
          nullable: true
        fax:
          type: string
          nullable: true

    CustomerAddressIngestionItem:
      type: object
      description: >
        One customer's full address set, as produced by
        emerion-load-service's CustomerAddressController.
      required:
        - externalId
        - cnpjEmpresa
        - enderecos
      properties:
        externalId:
          type: string
          description: >
            Customer's legacy Firebird primary key (codCli), used as the
            upsert/idempotency key.
        cnpjEmpresa:
          type: string
          description: Retailer/tenant CNPJ that owns this record, used to segregate data per retailer.
        cpfCnpj:
          type: string
          nullable: true
        enderecos:
          type: array
          items:
            $ref: '#/components/schemas/CustomerAddressDetailIngestionItem'

    CustomerAddressIngestionBatch:
      type: object
      required:
        - batchId
        - items
      properties:
        batchId:
          type: string
          description: Correlation id supplied by emerion-load-service for tracing/logging.
        items:
          type: array
          items:
            $ref: '#/components/schemas/CustomerAddressIngestionItem'

    CustomerCreditIngestionItem:
      type: object
      description: One credit ledger entry for a customer.
      required:
        - customerExternalId
        - cnpjEmpresa
        - data
        - valorUtilizado
        - valorTotal
        - saldo
        - tipo
      properties:
        customerExternalId:
          type: string
          description: >
            Customer's legacy Firebird primary key (codCli). Combined with
            sequencia, used as the upsert/idempotency key.
        cnpjEmpresa:
          type: string
          description: Retailer/tenant CNPJ that owns this record, used to segregate data per retailer.
        sequencia:
          type: string
          nullable: true
          description: >
            Legacy sequence number of this credit movement for the customer.
            When null, this entry cannot be safely deduplicated and is
            always inserted as a new row.
        data:
          type: string
          format: date-time
        dataPedido:
          type: string
          format: date-time
          nullable: true
        valorUtilizado:
          type: number
        valorTotal:
          type: number
        saldo:
          type: number
        situacao:
          type: string
          nullable: true
        tipo:
          type: string
          description: ENTRADA or SAIDA.

    CustomerOrderItemIngestionItem:
      type: object
      description: >
        One line item of a customer order. Fields beyond the original five
        mirror the additional PEDRE2 fields exposed by
        emerion-load-service's CustomerOrderItemProjection (tax/fiscal
        breakdown, discounts, and legacy tracking flags).
      required:
        - produto
        - quantidade
        - valorUnitario
        - valorTotal
        - seqRe2
      properties:
        produto:
          type: string
          description: Composite legacy product code (codGru.codSub.codPro).
        descricao:
          type: string
          nullable: true
        quantidade:
          type: number
        valorUnitario:
          type: number
        valorTotal:
          type: number
        seqRe2:
          type: integer
        codClp:
          type: string
          nullable: true
        codSt1:
          type: string
          nullable: true
        codUnd:
          type: string
          nullable: true
        vluRe2:
          type: number
          nullable: true
        dscRe2:
          type: number
          nullable: true
        dsrRe2:
          type: number
          nullable: true
        icmsAliquota:
          type: number
          nullable: true
        icmsBase:
          type: number
          nullable: true
        icmsValor:
          type: number
          nullable: true
        icmsReducaoBase:
          type: number
          nullable: true
        icmsSubstituicaoBase:
          type: number
          nullable: true
        icmsSubstituicaoValor:
          type: number
          nullable: true
        icmsSubstituicaoAliquota:
          type: number
          nullable: true
        icmsSubstituicaoMargem:
          type: number
          nullable: true
        icmsSubstituicaoReducaoBase:
          type: number
          nullable: true
        ipiAliquota:
          type: number
          nullable: true
        ipiBase:
          type: number
          nullable: true
        ipiValor:
          type: number
          nullable: true
        ipiClassificacao:
          type: string
          nullable: true
        ipiCst:
          type: string
          nullable: true
        pisBase:
          type: number
          nullable: true
        pisAliquota:
          type: number
          nullable: true
        pisValor:
          type: number
          nullable: true
        pisCst:
          type: string
          nullable: true
        cofinsBase:
          type: number
          nullable: true
        cofinsAliquota:
          type: number
          nullable: true
        cofinsValor:
          type: number
          nullable: true
        cofinsCst:
          type: string
          nullable: true
        descontoValor:
          type: number
          nullable: true
