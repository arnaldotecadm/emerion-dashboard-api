spring:
  application:
    name: emerion-dashboard

  # --- Datasource (PostgreSQL) ---
  datasource:
    url: jdbc:postgresql://localhost:5432/emerion_dashboard
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  # --- JPA / Hibernate ---
  # Flyway owns the schema; Hibernate must never create/alter tables.
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 20
    show-sql: false

  # --- Flyway ---
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# --- Server ---
server:
  port: 8080
  servlet:
    context-path: /api/v1
  error:
    include-message: always

# --- CORS (React frontend, deployed separately) ---
app:
  cors:
    allowed-origins: http://localhost:5173
  aws:
    # Explicit static credentials for now (per ops preference while running
    # outside AWS); once deployed to AWS/ECS/EC2 with a task/instance role,
    # switch CognitoAdminConfig's credentialsProvider to
    # DefaultCredentialsProvider.create() and these two properties can be
    # dropped entirely. Never commit real values here - set via the
    # AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY env vars.
    region: eu-north-1
    access-key-id: ${AWS_ACCESS_KEY_ID:}
    secret-access-key: ${AWS_SECRET_ACCESS_KEY:}
  security:
    cognito:
      # AWS Cognito user pool that issues the React app's JWTs (validated on
      # every request to the query/read endpoints; ingestion stays open for
      # emerion-load-service's server-to-server calls).
      issuer-uri: https://cognito-idp.eu-north-1.amazonaws.com/eu-north-1_NtDQLSmuT
      client-id: 395rpr7l5274ei0ivbjm6l2ptd
      required-group: COMPANY
      # Group required to trigger a manual Cognito user sync (see
      # CognitoUserSyncController) - distinct from required-group so regular
      # COMPANY users can't re-trigger the directory sync.
      admin-group: ADMIN
      # Same Cognito user pool as issuer-uri, needed separately because the
      # Admin API (ListUsers/AdminListGroupsForUser) takes a pool id, not an
      # issuer URL.
      user-pool-id: eu-north-1_NtDQLSmuT

# --- OpenAPI / Swagger UI (served from the hand-written contract-first spec at src/main/resources/openapi/api.yaml) ---
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    url: /openapi/api.yaml
    path: /swagger-ui.html

# --- Logging ---
logging:
  level:
    br.com.vertice.emerion_dashboard: DEBUG
