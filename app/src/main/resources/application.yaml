spring:
  application:
    name: emerion-dashboard

  # --- Datasource (PostgreSQL) ---
  datasource:
    url: jdbc:postgresql://localhost:5432/emerion_dashboard
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  # --- JPA / Hibernate ---
  # Flyway owns the schema; Hibernate must never create/alter tables.
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 20
    show-sql: false

  # --- Flyway ---
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# --- Server ---
server:
  port: 8080
  servlet:
    context-path: /api/v1
  error:
    include-message: always

# --- CORS (React frontend, deployed separately) ---
app:
  cors:
    allowed-origins: http://localhost:5173

# --- OpenAPI / Swagger UI (served from the hand-written contract-first spec at src/main/resources/openapi/api.yaml) ---
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    url: /openapi/api.yaml
    path: /swagger-ui.html

# --- Logging ---
logging:
  level:
    br.com.vertice.emerion_dashboard: DEBUG
