spring.application.name=emerion-dashboard

# --- Server ---
server.port=8080
server.servlet.context-path=/api/v1
server.error.include-message=always

# --- Datasource (PostgreSQL) ---
spring.datasource.url=jdbc:postgresql://localhost:5432/emerion_dashboard
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
# Flyway owns the schema; Hibernate must never create/alter tables.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.show-sql=false

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# --- CORS (React frontend, deployed separately) ---
app.cors.allowed-origins=http://localhost:5173

# --- OpenAPI / Swagger UI (served from the hand-written contract-first spec at src/main/resources/openapi/api.yaml) ---
springdoc.api-docs.enabled=false
springdoc.swagger-ui.url=/openapi/api.yaml
springdoc.swagger-ui.path=/swagger-ui.html

# --- Logging ---
logging.level.br.com.vertice.emerion_dashboard=DEBUG
